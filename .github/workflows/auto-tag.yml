name: Auto-tag release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so all tags are visible

      - name: Create release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(git tag -l 'v[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1"
          else
            NUM="${LATEST#v}"
            NEXT="v$((NUM + 1))"
          fi
          gh release create "$NEXT" \
            --title "$NEXT" \
            --generate-notes \
            --latest
          echo "Released $NEXT"
